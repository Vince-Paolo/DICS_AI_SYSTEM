{% extends 'pages/base.html' %}

{% block title %}Login | DICS AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card card-custom shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-3">DICS-AI Login</h2>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="/">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                    </div>
                    <button class="btn btn-brand w-100" type="submit">Login</button>
                </form>
                <p class="mt-3 text-center">Need an account? <a href="/register">Register now</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
