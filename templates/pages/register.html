{% extends 'pages/base.html' %}

{% block title %}Register | DICS AI{% endblock %}

{% block content %}
<!-- Wrapper to center content vertically and horizontally -->
<div class="d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card card-custom border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <h2 class="card-title text-center mb-4 fw-bold">Create Account</h2>
                        
                        {% if error %}
                            <div class="alert alert-danger rounded-3">{{ error }}</div>
                        {% endif %}
                        
                        <form method="post" action="/register">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Full Name</label>
                                <input type="text" class="form-control form-control-lg" name="full_name" placeholder="Enter full name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Email</label>
                                <input type="email" class="form-control form-control-lg" name="email" placeholder="Enter email address" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Username</label>
                                <input type="text" class="form-control form-control-lg" name="username" placeholder="Enter username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Contact Number</label>
                                <input type="tel" class="form-control form-control-lg" name="contact_number" placeholder="Enter contact number" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-uppercase" style="font-size: 0.85rem; letter-spacing: 0.5px;">Password</label>
                                <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" required>
                            </div>
                            <button class="btn btn-brand btn-lg w-100 fw-bold rounded-3 mt-2" type="submit">REGISTER</button>
                        </form>
                        
                        <p class="mt-4 text-center mb-0">Already have an account? <a href="/" class="text-decoration-none fw-semibold">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
