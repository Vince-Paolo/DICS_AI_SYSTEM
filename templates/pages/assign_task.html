{% extends 'pages/base.html' %}

{% block title %}Assign Task - DICS{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark border border-primary">
                <div class="card-header bg-primary bg-opacity-10 border-primary">
                    <h4 class="mb-0 text-primary fw-bold">
                        <i class="bi bi-plus-circle"></i> ASSIGN TASK TO AGENCY
                    </h4>
                </div>
                <div class="card-body">
                    <div class="mb-3 p-3 bg-secondary bg-opacity-10 rounded">
                        <p class="mb-1"><strong>Incident:</strong> #{{ response.incident_id }}</p>
                        <p class="mb-1"><strong>Type:</strong> {{ response.incident.hazard_type }}</p>
                        <p class="mb-0"><strong>Location:</strong> {{ response.incident.location or 'Unknown' }}</p>
                    </div>

                    <form method="POST" action="{{ url_for('commander.assign_task', response_id=response.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <!-- Agency Selection -->
                        <div class="mb-3">
                            <label for="agency" class="form-label text-info fw-bold">Assign To Agency *</label>
                            <select name="agency" id="agency" class="form-select bg-dark text-light border-secondary" required>
                                <option value="">-- Select Agency --</option>
                                {% for agency in agencies %}
                                    <option value="{{ agency.name }}">{{ agency.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Task Title -->
                        <div class="mb-3">
                            <label for="title" class="form-label text-info fw-bold">Task Title *</label>
                            <input type="text" name="title" id="title" class="form-control bg-dark text-light border-secondary" 
                                   placeholder="e.g., Evacuate Zone A, Clear Debris, Establish Shelter" required>
                        </div>

                        <!-- Task Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label text-info fw-bold">Detailed Description *</label>
                            <textarea name="description" id="description" class="form-control bg-dark text-light border-secondary" 
                                      rows="4" placeholder="Provide detailed instructions..." required></textarea>
                        </div>

                        <!-- Priority -->
                        <div class="mb-3">
                            <label for="priority" class="form-label text-info fw-bold">Priority Level</label>
                            <select name="priority" id="priority" class="form-select bg-dark text-light border-secondary">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>

                        <!-- Estimated Completion -->
                        <div class="mb-3">
                            <label for="estimated_completion" class="form-label text-info fw-bold">Estimated Completion</label>
                            <input type="datetime-local" name="estimated_completion" id="estimated_completion" 
                                   class="form-control bg-dark text-light border-secondary">
                        </div>

                        <!-- Form Actions -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-check-circle"></i> Assign Task
                            </button>
                            <a href="{{ url_for('commander.incident_response_detail', response_id=response.id) }}" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
