{% extends 'pages/base.html' %}

{% block title %}Allocate Resource - DICS{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark border border-success">
                <div class="card-header bg-success bg-opacity-10 border-success">
                    <h4 class="mb-0 text-success fw-bold">
                        <i class="bi bi-plus-circle"></i> ALLOCATE RESOURCE
                    </h4>
                </div>
                <div class="card-body">
                    <div class="mb-3 p-3 bg-secondary bg-opacity-10 rounded">
                        <p class="mb-1"><strong>Incident:</strong> #{{ response.incident_id }}</p>
                        <p class="mb-1"><strong>Type:</strong> {{ response.incident.hazard_type }}</p>
                        <p class="mb-0"><strong>Location:</strong> {{ response.incident.location or 'Unknown' }}</p>
                    </div>

                    <form method="POST" action="{{ url_for('allocate_resource', response_id=response.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <!-- Resource Type -->
                        <div class="mb-3">
                            <label for="resource_type" class="form-label text-success fw-bold">Resource Type *</label>
                            <select name="resource_type" id="resource_type" class="form-select bg-dark text-light border-secondary" required>
                                <option value="">-- Select Resource Type --</option>
                                <option value="Personnel">Personnel</option>
                                <option value="Vehicles">Vehicles</option>
                                <option value="Medical Equipment">Medical Equipment</option>
                                <option value="Rescue Equipment">Rescue Equipment</option>
                                <option value="Shelters">Shelters</option>
                                <option value="Food Supplies">Food Supplies</option>
                                <option value="Water">Water</option>
                                <option value="Generators">Generators</option>
                                <option value="Communications Equipment">Communications Equipment</option>
                                <option value="Heavy Equipment">Heavy Equipment</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Agency -->
                        <div class="mb-3">
                            <label for="agency" class="form-label text-success fw-bold">From Agency *</label>
                            <select name="agency" id="agency" class="form-select bg-dark text-light border-secondary" required>
                                <option value="">-- Select Agency --</option>
                                <option value="Fire Department">Fire Department</option>
                                <option value="Emergency Management">Emergency Management</option>
                                <option value="Police Department">Police Department</option>
                                <option value="Medical Services">Medical Services</option>
                                <option value="Search & Rescue">Search & Rescue</option>
                                <option value="Public Works">Public Works</option>
                                <option value="Environmental Protection">Environmental Protection</option>
                                <option value="Transportation Authority">Transportation Authority</option>
                                <option value="National Guard">National Guard</option>
                                <option value="Red Cross">Red Cross</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Quantity -->
                        <div class="mb-3">
                            <label for="quantity" class="form-label text-success fw-bold">Quantity *</label>
                            <input type="number" name="quantity" id="quantity" class="form-control bg-dark text-light border-secondary" 
                                   min="1" value="1" required>
                        </div>

                        <!-- Location -->
                        <div class="mb-3">
                            <label for="location" class="form-label text-success fw-bold">Deployment Location</label>
                            <input type="text" name="location" id="location" class="form-control bg-dark text-light border-secondary" 
                                   placeholder="e.g., Zone A, Shelter Site 1, Route 5">
                        </div>

                        <!-- Notes -->
                        <div class="mb-3">
                            <label for="notes" class="form-label text-success fw-bold">Additional Notes</label>
                            <textarea name="notes" id="notes" class="form-control bg-dark text-light border-secondary" 
                                      rows="3" placeholder="Equipment condition, special instructions, etc."></textarea>
                        </div>

                        <!-- Form Actions -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-check-circle"></i> Allocate Resource
                            </button>
                            <a href="{{ url_for('incident_response_detail', response_id=response.id) }}" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
